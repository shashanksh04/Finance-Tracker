services:
  db:
    image: pgvector/pgvector:pg16
    platform: linux/arm64
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finance_db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devpassword}"]
    restart: unless-stopped

  app:
    build: .
    ports:
      - "80:80"
    volumes:
      - uploads:/var/www/finance-tracker/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://finance_user:${DB_PASSWORD}@db:5432/finance_db
      DATABASE_URL_SYNC: postgresql+psycopg2://finance_user:${DB_PASSWORD}@db:5432/finance_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: https://finance.shashankakumar.com,https://neha.shashankakumar.com,http://localhost:8081,exp://*
      OLLAMA_BASE_URL: https://ollama.com
      OLLAMA_MODEL: gpt-oss:120b-cloud
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      UPLOAD_DIR: /var/www/finance-tracker/uploads
      LOG_LEVEL: INFO
      EMBEDDING_MODEL: mxbai-embed-large
      EMBEDDING_DIMENSION: 1024
      CONVERSATION_TTL_HOURS: 24
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
